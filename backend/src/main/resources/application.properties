# --- Server ---
server.port=8082

# --- MySQL connection ---
# IMPORTANT: Change `your_password` to your actual MySQL password.
spring.datasource.url=jdbc:mysql://localhost:3306/userapp?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# `update` means: create the table if it doesn't exist, update it if the entity changes,
# but never drop data. Good for learning. (Use `validate` in production.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
