<div class="header-row">
  <h1>All users</h1>
  <button (click)="loadUsers()" [disabled]="loading">↻ Refresh</button>
</div>

<p *ngIf="loading" class="state">Loading...</p>

<p *ngIf="error" class="state error">{{ error }}</p>

<p *ngIf="!loading && !error && users.length === 0" class="state empty">
  No users yet. <a routerLink="/add">Add the first one →</a>
</p>

<table *ngIf="!loading && users.length > 0">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Age</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let user of users">
      <td>{{ user.id }}</td>
      <td>{{ user.name }}</td>
      <td>{{ user.age }}</td>
    </tr>
  </tbody>
</table>
